<!DOCTYPE html>
<html>
<head>
  <title>Chit Draw Dashboard</title>
  <style>
    body { font-family: Arial; text-align:center; background:#f5f5f5; }
    textarea { width:300px; height:120px; }
    button {
      padding:10px 15px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-size:15px;
    }
    .spin { background:green; color:white; }
    .update { background:blue; color:white; }
    .remove { background:red; color:white; }
    .reset { background:black; color:white; }
    canvas { margin-top:20px; }
    #history {
      margin-top:20px;
      background:white;
      padding:10px;
      display:inline-block;
      text-align:left;
      width:250px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<h2>🎯 Chit Draw Dashboard</h2>

<textarea id="names">
KAVISH 
PAVAN
KHUSHI
NANDINI
</textarea><br>

<button class="update" onclick="updateWheel()">Update Members</button>
<button class="spin" onclick="spin()">SPIN</button>
<button class="remove" onclick="removeWinner()">Remove Winner</button>
<button class="reset" onclick="resetAll()">Reset All</button>

<h2 id="result"></h2>

<canvas id="wheel" width="400" height="400"></canvas>

<div id="history">
<h3>🏆 Winners History</h3>
<ul id="historyList"></ul>
</div>

<script>
let names = [];
let angle = 0;
let spinning = false;
let winnerIndex = null;
let history = [];

function updateWheel() {
  let input = document.getElementById("names").value;
  names = input.split("\n").filter(n => n.trim() !== "");
  drawWheel();
}

function drawWheel() {
  let canvas = document.getElementById("wheel");
  let ctx = canvas.getContext("2d");
  let arc = 2 * Math.PI / names.length;

  ctx.clearRect(0, 0, 400, 400);

  for (let i = 0; i < names.length; i++) {
    let start = i * arc;

    ctx.beginPath();
    ctx.fillStyle = i % 2 === 0 ? "#ffcc00" : "#ff5733";
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, start, start + arc);
    ctx.fill();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(start + arc / 2);
    ctx.fillStyle = "#000";
    ctx.fillText(names[i], 100, 0);
    ctx.restore();
  }

  // pointer
  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.moveTo(200, 0);
  ctx.lineTo(220, 40);
  ctx.lineTo(180, 40);
  ctx.fill();
}

function spin() {
  if (spinning || names.length === 0) return;
  spinning = true;

  let spinAngle = Math.random() * 3000 + 3000;
  let duration = 4000;
  let start = null;

  function animate(timestamp) {
    if (!start) start = timestamp;
    let progress = timestamp - start;

    angle = (spinAngle * progress / duration);
    drawRotatedWheel(angle);

    if (progress < duration) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      showResult();
    }
  }

  requestAnimationFrame(animate);
}

function drawRotatedWheel(rot) {
  let canvas = document.getElementById("wheel");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, 400, 400);
  ctx.save();
  ctx.translate(200, 200);
  ctx.rotate(rot * Math.PI / 180);
  ctx.translate(-200, -200);
  drawWheel();
  ctx.restore();
}

function showResult() {
  let deg = angle % 360;
  winnerIndex = Math.floor((names.length - (deg / 360) * names.length)) % names.length;

  let winner = names[winnerIndex];
  document.getElementById("result").innerText = "🏆 Winner: " + winner;

  history.push(winner);
  updateHistory();
}

function updateHistory() {
  let list = document.getElementById("historyList");
  list.innerHTML = "";
  history.forEach((h, i) => {
    let li = document.createElement("li");
    li.innerText = "Month " + (i+1) + ": " + h;
    list.appendChild(li);
  });
}

function removeWinner() {
  if (winnerIndex === null) return;
  names.splice(winnerIndex, 1);
  document.getElementById("names").value = names.join("\n");
  winnerIndex = null;
  drawWheel();
  document.getElementById("result").innerText = "";
}

function resetAll() {
  names = [];
  history = [];
  document.getElementById("names").value = "";
  document.getElementById("result").innerText = "";
  document.getElementById("historyList").innerHTML = "";
  drawWheel();
}

updateWheel();
</script>

</body>
</html>
